name: Phoenix V100 (5-Machine Matrix)

on:
  workflow_dispatch:
  push:
    branches:
      - main  # Autostarts immediately when you upload or edit the code

permissions:
  actions: write
  contents: read

jobs:
  run-loop:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        machine-id: [1, 2, 3]
      fail-fast: false # Prevents one machine crashing from stopping the others

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Run Engine Matrix
        env:
          SESSION_ID: ${{ secrets.SESSION_ID }}
          GROUP_URL: ${{ secrets.GROUP_URL }}
          PYTHONUNBUFFERED: "1" # Forces Python to output logs immediately
        run: |
          python -u main.py

  restart:
    needs: run-loop
    if: always() # Ensures it restarts even if a machine crashes or times out
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code (for gh cli)
        uses: actions/checkout@v4
        
      - name: Trigger Next Run
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run main.yml
